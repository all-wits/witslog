name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace --verbose

  bench-regression:
    name: bench regression gate (FR-P7-002)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo bench --save-baseline ci
        run: cargo bench -p witslog-bench -- --save-baseline ci
      - name: check regression vs committed baseline
        shell: pwsh
        run: ./scripts/check_bench_regression.ps1

  concurrency-and-load:
    name: concurrency + load harness (FR-P7-003/004)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run p7 concurrency + load tests
        run: cargo test -p witslog-store --test p7_concurrency --test p7_load --verbose
