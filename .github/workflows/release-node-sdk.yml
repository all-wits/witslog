name: Release Node SDK (cross-platform native lib)

# Builds witslog_ffi + the witslog CLI natively on 4 hosted-runner OS/arch
# combos (no cross-compilation - avoids the rusqlite bundled-C cross-toolchain
# problem), assembles them into bindings/node/_libs/<platform>/ and
# bindings/node/_bin/<platform>/, then publishes @all-wits/witslog to npm.
# The _libs/<platform>/ artifacts are reusable by the Python and PHP bindings'
# identical locator convention (see bindings/CONTRACT.md); _bin/<platform>/
# (the CLI binary) is Node-only so far - `witslog query`/`stats`/etc. have no
# FFI surface, only the CLI/MCP expose them (see CONTRACT.md + CLAUDE.md).
#
# darwin-x64 (Intel Mac) is NOT built here - the macos-13 hosted runner pool
# queues far longer than macos-14 (Apple Silicon) and was dropped; Intel Mac
# users will hit WitslogLibraryError until that's revisited.
#
# Trigger: manual only (workflow_dispatch). Publishes via npm Trusted
# Publishing (OIDC) - no NPM_TOKEN secret needed or used. Requires the
# npmjs.com package's Trusted Publisher config (Publisher: GitHub Actions,
# org: all-wits, repo: witslog, workflow filename: release-node-sdk.yml,
# environment: <blank, this job doesn't declare one>) and `id-token: write`
# below, which is what lets GitHub mint the OIDC token npm exchanges for a
# short-lived publish credential.
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm after building (false = build/verify only)"
        required: true
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_dir: win32-x64
            lib_name: witslog_ffi.dll
            artifact_path: target/release/witslog_ffi.dll
            cli_name: witslog.exe
            cli_artifact_path: target/release/witslog.exe
          - os: ubuntu-latest
            platform_dir: linux-x64
            lib_name: libwitslog_ffi.so
            artifact_path: target/release/libwitslog_ffi.so
            cli_name: witslog
            cli_artifact_path: target/release/witslog
          - os: ubuntu-24.04-arm
            platform_dir: linux-arm64
            lib_name: libwitslog_ffi.so
            artifact_path: target/release/libwitslog_ffi.so
            cli_name: witslog
            cli_artifact_path: target/release/witslog
          # macos-13 (Intel) dropped: GitHub-hosted runner pool for it queues
          # for a very long time (far worse than macos-14/Apple Silicon).
          # darwin-x64 users are unsupported until an Intel Mac runner/self-hosted
          # option is available again - see bindings/CONTRACT.md locator note.
          - os: macos-14 # Apple Silicon
            platform_dir: darwin-arm64
            lib_name: libwitslog_ffi.dylib
            artifact_path: target/release/libwitslog_ffi.dylib
            cli_name: witslog
            cli_artifact_path: target/release/witslog

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo build --release -p witslog-ffi -p witslog-cli
        run: cargo build --release -p witslog-ffi -p witslog-cli

      - name: Verify the expected artifacts exist
        shell: bash
        run: |
          test -f "${{ matrix.artifact_path }}"
          test -f "${{ matrix.cli_artifact_path }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform_dir }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform_dir }}-cli
          path: ${{ matrix.cli_artifact_path }}
          if-no-files-found: error

  assemble-and-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "latest"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm CLI >= 11.5.1; pin to latest so an
      # older bundled npm doesn't silently fall back to token auth.
      - name: Ensure npm supports Trusted Publishing (OIDC)
        run: npm install -g npm@latest

      - name: Download all platform artifacts into bindings/node/_libs/
        uses: actions/download-artifact@v4
        with:
          path: bindings/node/_libs

      # actions/download-artifact@v4 lays each artifact out as
      # _libs/<platform_dir>/<lib_name> already - matches the SDK locator
      # convention (bindings/CONTRACT.md) with zero rearranging needed. The
      # `-cli` artifacts land alongside as _libs/<platform_dir>-cli/<cli_name>;
      # move those into _bin/<platform_dir>/ (the CLI locator convention,
      # bindings/node/lib/cli-locator.js) and set the exec bit - artifact
      # upload/download does not reliably preserve it on non-Windows.
      - name: Move CLI binaries into bindings/node/_bin/
        shell: bash
        run: |
          set -e
          mkdir -p bindings/node/_bin
          for d in bindings/node/_libs/*-cli; do
            [ -d "$d" ] || continue
            platform=$(basename "$d" -cli)
            mkdir -p "bindings/node/_bin/$platform"
            mv "$d"/* "bindings/node/_bin/$platform/"
            rmdir "$d"
          done
          find bindings/node/_bin -type f -not -name '*.exe' -exec chmod +x {} \;

      - name: List assembled _libs / _bin
        run: |
          find bindings/node/_libs -type f
          find bindings/node/_bin -type f

      - name: npm pack --dry-run (always, for the workflow log)
        working-directory: bindings/node
        run: npm pack --dry-run

      # Guards against re-publishing an already-shipped version (npm rejects
      # it anyway, but this fails fast with a clear reason instead of an
      # opaque registry 403, and skips a wasted auth attempt).
      - name: Check whether package.json version differs from the published one
        id: version_check
        working-directory: bindings/node
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$(node -p "require('./package.json').name")" version 2>/dev/null || echo "none")
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json version ($LOCAL_VERSION) matches the published version - publish will be skipped. Bump the version to release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: npm publish
        if: ${{ inputs.publish && steps.version_check.outputs.changed == 'true' }}
        working-directory: bindings/node
        run: npm publish --access public
